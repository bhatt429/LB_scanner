<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>L&B Label Scanner v2</title>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="products.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700;900&display=swap');
  :root {
    --maroon: #7A0C2E; --maroon-dark: #5a0920;
    --gold: #F0B722; --orange: #E07020;
    --cream: #F5F0E8; --white: #ffffff;
    --text: #1a0a10; --muted: #9a7a84;
    --border: #ddd0d4;
    --success: #1a7a42; --success-bg: #edfaf3;
    --error: #c0182e; --error-bg: #fff0f2;
    --warn: #b86000; --warn-bg: #fff7e6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--cream); color: var(--text); font-family: "DM Sans", sans-serif; min-height: 100vh; padding-bottom: 70px; }
  .header { background: var(--maroon); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(122,12,46,0.3); }
  .header-title { color: #fff; font-size: 16px; font-weight: 900; }
  .header-sub { color: rgba(255,255,255,0.65); font-size: 11px; }
  .worker-badge { background: var(--gold); color: var(--maroon-dark); font-family: "Space Mono", monospace; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; cursor: pointer; }
  .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); border-top: 2px solid var(--border); display: none; z-index: 200; }
  .tab-bar-inner { display: flex; max-width: 480px; margin: 0 auto; }
  .tab-btn { flex: 1; padding: 10px 0; border: none; background: none; font-family: "DM Sans", sans-serif; font-size: 11px; font-weight: 700; color: var(--muted); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .tab-btn.active { color: var(--maroon); }
  .tab-icon { font-size: 20px; }
  .tab-indicator { width: 24px; height: 3px; border-radius: 2px; margin-top: 2px; }
  .tab-btn.active .tab-indicator { background: var(--maroon); }
  .page { display: none; padding: 20px; max-width: 480px; margin: 0 auto; }
  .page.active { display: block; }
  .setup-card { background: var(--white); border-radius: 16px; padding: 28px 24px; box-shadow: 0 2px 12px rgba(122,12,46,0.1); margin-top: 24px; }
  .setup-logo { text-align: center; margin-bottom: 24px; }
  .setup-logo-text { font-size: 28px; font-weight: 900; color: var(--maroon); }
  .setup-logo-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .field-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; font-family: "Space Mono", monospace; }
  .field-wrap { margin-bottom: 16px; }
  .field-input { width: 100%; padding: 13px 15px; border-radius: 12px; border: 2px solid var(--border); background: var(--cream); color: var(--text); font-family: "DM Sans", sans-serif; font-size: 15px; outline: none; transition: border 0.2s; appearance: none; -webkit-appearance: none; }
  .field-input:focus { border-color: var(--maroon); }
  .btn { display: block; width: 100%; padding: 15px; border-radius: 12px; border: none; font-family: "DM Sans", sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.18s; margin-bottom: 10px; }
  .btn-primary { background: var(--maroon); color: #fff; }
  .btn-danger { background: var(--error); color: #fff; }
  .btn-success { background: var(--success); color: #fff; font-size: 17px; padding: 18px; }
  .btn-outline { background: transparent; color: var(--maroon); border: 2px solid var(--maroon); }
  .scanner-wrap { position: relative; width: 100%; border-radius: 16px; overflow: hidden; background: #000; margin-bottom: 16px; display: none; }
  #qr-reader { border: none !important; padding: 0 !important; width: 100% !important; }
  #qr-reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
  #qr-reader img, #qr-reader__dashboard { display: none !important; }
  #qr-reader__scan_region { padding: 0 !important; }
  .scan-overlay { position: absolute; inset: 0; pointer-events: none; display: flex; align-items: center; justify-content: center; }
  .scan-frame { width: 75%; height: 30%; position: relative; }
  .scan-frame::before, .scan-frame::after, .scan-frame span::before, .scan-frame span::after { content: ""; position: absolute; width: 24px; height: 24px; border-color: var(--gold); border-style: solid; }
  .scan-frame::before { top:0; left:0; border-width: 3px 0 0 3px; }
  .scan-frame::after  { top:0; right:0; border-width: 3px 3px 0 0; }
  .scan-frame span::before { bottom:0; left:0; border-width: 0 0 3px 3px; }
  .scan-frame span::after  { bottom:0; right:0; border-width: 0 3px 3px 0; }
  .scan-line { position: absolute; left: 4%; right: 4%; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); animation: scanline 2s ease-in-out infinite; }
  @keyframes scanline { 0% { top: 4%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 96%; opacity: 0; } }
  .result-card { border-radius: 16px; padding: 20px; margin-bottom: 12px; display: none; border: 2px solid transparent; }
  .result-card.show { display: block; }
  .result-card.found { background: var(--success-bg); border-color: #a8e6c3; }
  .result-card.miss  { background: var(--error-bg); border-color: #f5b8c0; }
  .result-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; font-weight: 700; font-family: "Space Mono", monospace; }
  .result-code  { font-family: "Space Mono", monospace; font-size: 12px; font-weight: 700; color: var(--maroon); margin-bottom: 10px; word-break: break-all; }
  .result-brand { font-size: 13px; color: var(--muted); margin-bottom: 2px; }
  .result-desc  { font-size: 19px; font-weight: 900; line-height: 1.2; margin-bottom: 12px; }
  .tag-box { border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; border: 2px solid; }
  .tag-box.mim    { background: #1a3a6e12; border-color: #1a3a6e40; }
  .tag-box.mgrown { background: #1a5c2a12; border-color: #1a5c2a40; }
  .tag-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; font-family: "Space Mono", monospace; }
  .tag-box.mim    .tag-label { color: #1a3a6e; }
  .tag-box.mgrown .tag-label { color: #1a5c2a; }
  .tag-name { font-size: 16px; font-weight: 900; }
  .tag-box.mim    .tag-name { color: #1a3a6e; }
  .tag-box.mgrown .tag-name { color: #1a5c2a; }
  .note-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 30px; font-size: 12px; font-weight: 700; margin-bottom: 14px; }
  .note-pill.flagged     { background: var(--success); color: #fff; }
  .note-pill.not-flagged { background: var(--orange);  color: #fff; }
  .note-pill.na          { background: #ccc; color: #555; }
  .divider { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 12px; margin: 14px 0; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .manual-row { display: flex; gap: 10px; }
  .manual-input { flex: 1; padding: 13px 15px; border-radius: 12px; border: 2px solid var(--border); background: #fff; color: var(--text); font-family: "Space Mono", monospace; font-size: 14px; outline: none; }
  .manual-input:focus { border-color: var(--maroon); }
  .manual-go { padding: 13px 20px; border-radius: 12px; border: none; background: var(--maroon); color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; }
  .saving-indicator { text-align: center; padding: 8px; font-size: 12px; color: var(--muted); display: none; }
  /* Browse */
  .browse-filters { background: var(--white); border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(122,12,46,0.08); }
  .browse-filters .field-wrap { margin-bottom: 10px; }
  .browse-filters .field-wrap:last-child { margin-bottom: 0; }
  .browse-summary { font-size: 12px; color: var(--muted); margin-bottom: 12px; font-family: "Space Mono", monospace; text-align: center; }
  .product-list { display: flex; flex-direction: column; gap: 10px; }
  .product-item { background: var(--white); border-radius: 14px; padding: 14px 16px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .product-item.tagged { opacity: 0.45; border-color: var(--success); background: var(--success-bg); }
  .product-item-info { flex: 1; min-width: 0; }
  .product-item-brand { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 2px; }
  .product-item-desc { font-size: 14px; font-weight: 700; line-height: 1.2; margin-bottom: 4px; }
  .product-item-upc { font-family: "Space Mono", monospace; font-size: 10px; color: var(--muted); }
  .product-item-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; flex-shrink: 0; }
  .product-item-tag { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
  .product-item-tag.mim    { background: #1a3a6e20; color: #1a3a6e; }
  .product-item-tag.mgrown { background: #1a5c2a20; color: #1a5c2a; }
  .lb-link { display: inline-block; padding: 7px 12px; border-radius: 10px; background: var(--maroon); color: #fff; font-size: 11px; font-weight: 700; text-decoration: none; white-space: nowrap; }
  .tagged-badge { font-size: 11px; font-weight: 700; color: var(--success); font-family: "Space Mono", monospace; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  /* Toast */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--maroon); color: #fff; padding: 11px 22px; border-radius: 30px; font-weight: 700; font-size: 13px; z-index: 999; transition: transform 0.3s; white-space: nowrap; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.ok   { background: var(--success); }
  .toast.warn { background: var(--orange); }
  .toast.err  { background: var(--error); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header" id="header" style="display:none;">
  <div>
    <div class="header-title">L&amp;B Label Scanner</div>
    <div class="header-sub" id="header-sub">—</div>
  </div>
  <div class="worker-badge" id="worker-badge" onclick="changeWorker()">👤 —</div>
</div>

<!-- SETUP PAGE -->
<div class="page active" id="page-setup">
  <div class="setup-card">
    <div class="setup-logo">
      <div class="setup-logo-text">L&amp;B Scanner</div>
      <div class="setup-logo-sub">MDA Label Compliance Tool</div>
    </div>
    <div class="field-wrap">
      <div class="field-label">Your Name</div>
      <input class="field-input" id="inp-name" type="text" placeholder="e.g. Sarah" autocomplete="off">
    </div>
    <div class="field-wrap">
      <div class="field-label">Store</div>
      <select class="field-input" id="inp-store">
        <option value="">— Select store —</option>
        <option>St. Louis Park</option>
        <option>Golden Valley</option>
        <option>Burnsville</option>
        <option>Chanhassen</option>
        <option>Eagan</option>
        <option>Maple Grove</option>
        <option>Woodbury</option>
        <option>Plymouth</option>
        <option>White Bear Lake</option>
      </select>
    </div>
    <div class="field-wrap">
      <div class="field-label">Department</div>
      <select class="field-input" id="inp-dept">
        <option value="">— Select department —</option>
        <option>PRODUCE</option>
        <option>BEER</option>
        <option>DAIRY</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="startSession()">Start →</button>
    <div id="setup-err" style="text-align:center;font-size:12px;color:var(--error);margin-top:8px;min-height:18px;"></div>
  </div>
</div>

<!-- SCANNER PAGE (Tab 1) -->
<div class="page" id="page-scanner">
  <div class="scanner-wrap" id="scanner-wrap">
    <div id="qr-reader"></div>
    <div class="scan-overlay">
      <div class="scan-frame"><span></span><div class="scan-line"></div></div>
    </div>
  </div>
  <button class="btn btn-primary" id="btn-start" onclick="startScanner()">▶ &nbsp;Start Camera</button>
  <button class="btn btn-danger"  id="btn-stop"  onclick="stopScanner()" style="display:none;">■ &nbsp;Stop Camera</button>
  <div id="result-card" class="result-card"></div>
  <div class="saving-indicator" id="saving-indicator">⏳ Saving…</div>
  <div class="divider">or enter manually</div>
  <div class="manual-row">
    <input class="manual-input" id="manual-upc" type="text" inputmode="numeric" placeholder="Type UPC…" onkeydown="if(event.key==='Enter') lookupManual()">
    <button class="manual-go" onclick="lookupManual()">→</button>
  </div>
</div>

<!-- BROWSE PAGE (Tab 2) -->
<div class="page" id="page-browse">
  <div class="browse-filters">
    <div class="field-wrap">
      <div class="field-label">Brand</div>
      <select class="field-input" id="browse-brand" onchange="renderBrowseList()">
        <option value="">— All brands —</option>
      </select>
    </div>
  </div>
  <div class="browse-summary" id="browse-summary"></div>
  <div class="product-list" id="product-list"></div>
</div>

<!-- TAB BAR -->
<div class="tab-bar" id="tab-bar">
  <div class="tab-bar-inner">
    <button class="tab-btn active" id="tab-btn-scanner" onclick="switchTab('scanner')">
      <span class="tab-icon">📷</span>
      <span id="tab-label-scanner">Scanner</span>
      <div class="tab-indicator"></div>
    </button>
    <button class="tab-btn" id="tab-btn-browse" onclick="switchTab('browse')">
      <span class="tab-icon">📋</span>
      <span>Browse</span>
      <div class="tab-indicator"></div>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let workerName='', storeName='', deptTab='', storeUrl='', storeRsid='';
let tagCount=0, lastScanned='', lastScanTime=0;
let html5QrCode=null, scannerOn=false, currentUPC=null;
let taggedUPCs = new Set();

const STORE_RSIDS = {
  "St. Louis Park":"1007","Golden Valley":"1001","Burnsville":"1011",
  "Chanhassen":"1012","Eagan":"1013","Maple Grove":"15014",
  "Woodbury":"15031","Plymouth":"51009","White Bear Lake":"51019"
};
const STORE_URLS = {
  "St. Louis Park":"https://script.google.com/macros/s/AKfycbx7KE7kRTaCJpI8SUzedQtCS9lHQmJcRGrt1HT6VF6MYcBAHF6O6-QtW1PSNdJx0S404g/exec",
  "Golden Valley":"https://script.google.com/macros/s/AKfycbw56dmi5F93xRtykSvvpTg7YyYjJY895z8R4dl_YuUQkixObRILmdrY1vaoikwfSDfrEg/exec"
};

function switchTab(tab) {
  if (tab !== 'scanner') stopScanner();
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-btn-' + tab).classList.add('active');
  if (tab === 'browse') renderBrowseList();
}

function startSession() {
  const name  = document.getElementById('inp-name').value.trim();
  const store = document.getElementById('inp-store').value;
  const dept  = document.getElementById('inp-dept').value;
  const err   = document.getElementById('setup-err');
  if (!name)  { err.textContent = 'Please enter your name.'; return; }
  if (!store) { err.textContent = 'Please select a store.'; return; }
  if (!dept)  { err.textContent = 'Please select a department.'; return; }

  workerName=name; storeName=store; deptTab=dept;
  storeUrl=STORE_URLS[store]||''; storeRsid=STORE_RSIDS[store]||'';
  tagCount=0; taggedUPCs=new Set();

  document.getElementById('header').style.display='flex';
  document.getElementById('tab-bar').style.display='block';
  document.getElementById('header-sub').textContent=store+' · '+dept;
  document.getElementById('worker-badge').textContent='👤 '+name;

  // Build brand dropdown
  const brands = [...new Set(Object.values(PRODUCTS).map(p => p.brand&&p.brand.trim()).filter(Boolean))].sort();
  const sel = document.getElementById('browse-brand');
  sel.innerHTML = '<option value="">— All brands —</option>';
  brands.forEach(b => { const o=document.createElement('option'); o.value=o.textContent=b; sel.appendChild(o); });

  switchTab('scanner');
}

function renderBrowseList() {
  const filterBrand = document.getElementById('browse-brand').value;
  const list = document.getElementById('product-list');
  const summary = document.getElementById('browse-summary');

  let entries = Object.entries(PRODUCTS);
  if (filterBrand) entries = entries.filter(([,p]) => p.brand&&p.brand.trim()===filterBrand);

  const total = entries.length;
  const tagged = entries.filter(([upc]) => taggedUPCs.has(upc)).length;
  summary.textContent = `${total-tagged} remaining · ${tagged} tagged · ${total} total`;

  if (!entries.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div>No products found</div></div>';
    return;
  }

  list.innerHTML = entries.map(([upc, p]) => {
    const isTagged = taggedUPCs.has(upc);
    const isMIM = p.mda==='Made in Minnesota';
    const tagClass = isMIM?'mim':'mgrown';
    const tagLabel = isMIM?'🏭 MIM':'🌱 MG';
    const upc14 = upc.padStart(14,'0');
    const lbUrl = storeRsid
      ? `https://www.lundsandbyerlys.com/sm/pickup/rsid/${storeRsid}/product/${upc14}`
      : '#';
    return `<div class="product-item${isTagged?' tagged':''}" id="item-${upc}">
      <div class="product-item-info">
        <div class="product-item-brand">${p.brand||''}</div>
        <div class="product-item-desc">${p.desc||''}</div>
        <div class="product-item-upc">${upc}</div>
      </div>
      <div class="product-item-actions">
        <span class="product-item-tag ${tagClass}">${tagLabel}</span>
        ${isTagged
          ? '<span class="tagged-badge">✓ Done</span>'
          : `<a class="lb-link" href="${lbUrl}" target="_blank">🛒 View</a>`}
      </div>
    </div>`;
  }).join('');
}

function lookup(raw) {
  const c = String(raw).replace(/[-\s]/g,'');
  const stripped = c.replace(/^0+/,'')||c;
  const variants = [c,stripped,c.padStart(13,'0'),c.padStart(12,'0'),stripped.slice(0,-1),c.slice(0,-1),stripped.slice(0,-2),c.slice(0,-2)];
  for (const v of variants) {
    if (!v) continue;
    if (PRODUCTS[v]) return {upc:v,product:PRODUCTS[v]};
    const vs=v.replace(/^0+/,'');
    for (const [key,prod] of Object.entries(PRODUCTS)) {
      if (key.replace(/^0+/,'')===vs) return {upc:key,product:prod};
    }
  }
  return null;
}

function showResult(rawCode) {
  currentUPC=rawCode;
  const card=document.getElementById('result-card');
  const found=lookup(rawCode);
  if (!found) {
    card.innerHTML=`<div class="result-label">Scanned</div><div class="result-code">${rawCode}</div>
      <div style="font-size:16px;font-weight:700;color:var(--error);margin-bottom:6px;">❌ No match found</div>
      <div style="font-size:13px;color:var(--muted);">Not in the label list.</div>`;
    card.className='result-card show miss';
    showToast('No match','err'); return;
  }
  const {upc,product:p}=found;
  const isMIM=p.mda==='Made in Minnesota';
  const tagClass=isMIM?'mim':'mgrown';
  const tagIcon=isMIM?'🏭':'🌱';
  const tagFull=isMIM?'Made in Minnesota (MIM)':'MN Grown (MG)';
  const upc14=upc.padStart(14,'0');
  const lbUrl=storeRsid?`https://www.lundsandbyerlys.com/sm/pickup/rsid/${storeRsid}/product/${upc14}`:null;
  let notePill='';
  if (p.note==='Flagged as Local') notePill=`<span class="note-pill flagged">✓ Flagged as Local</span>`;
  else if (p.note==='Not flagged as local') notePill=`<span class="note-pill not-flagged">🟠 Not Flagged as Local</span>`;
  else if (p.note) notePill=`<span class="note-pill na">${p.note}</span>`;
  const alreadyTagged=taggedUPCs.has(upc);
  card.innerHTML=`
    <div class="result-label">Scanned</div>
    <div class="result-code">${rawCode}</div>
    <div class="result-brand">${p.brand}</div>
    <div class="result-desc">${p.desc}</div>
    <div class="tag-box ${tagClass}">
      <div class="tag-label">Apply this tag</div>
      <div class="tag-name">${tagIcon} ${tagFull}</div>
    </div>
    ${notePill?notePill+'<br><br>':''}
    ${alreadyTagged
      ? '<div style="font-size:14px;font-weight:700;color:var(--success);margin-bottom:10px;">✓ Already tagged this session</div>'
      : `<button class="btn btn-success" id="btn-done" onclick="confirmDone('${upc}')">✓ &nbsp;Done — Tag Applied</button>`}
    <button class="btn btn-outline" id="btn-undo" onclick="undoTag('${upc}')" style="${alreadyTagged?'':'display:none;'}">↩ Undo Tag</button>
    ${lbUrl?`<a href="${lbUrl}" target="_blank" style="display:block;text-align:center;margin-top:10px;padding:12px;border-radius:12px;border:2px solid var(--border);color:var(--maroon);font-size:13px;font-weight:700;text-decoration:none;">🛒 View on L&amp;B Website</a>`:''}
  `;
  card.className='result-card show found';
  showToast(p.desc.slice(0,30),'ok');
}

function confirmDone(upc) {
  const btnDone=document.getElementById('btn-done');
  const btnUndo=document.getElementById('btn-undo');
  if (btnDone) btnDone.style.display='none';
  setSaving(true);
  taggedUPCs.add(upc);
  tagCount++;
  document.getElementById('tab-label-scanner').textContent=`Scanner (${tagCount})`;
  // Update browse list item
  const item=document.getElementById('item-'+upc);
  if (item) {
    item.classList.add('tagged');
    const link=item.querySelector('.lb-link');
    if (link) link.outerHTML='<span class="tagged-badge">✓ Done</span>';
  }
  if (storeUrl) {
    fetch(storeUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'tag',tab:deptTab,upc,workerName})
    }).then(()=>{
      setSaving(false);
      if (btnUndo) btnUndo.style.display='block';
      const card=document.getElementById('result-card');
      const info=document.createElement('div');
      info.style.cssText='font-size:13px;color:var(--success);font-weight:700;margin-bottom:10px;';
      info.textContent='✓ Tagged by '+workerName;
      if (btnUndo) card.insertBefore(info,btnUndo);
      showToast('✓ Saved!','ok');
    }).catch(()=>{ setSaving(false); showToast('✓ Tagged (sheet offline)','warn'); });
  } else {
    setSaving(false);
    if (btnUndo) btnUndo.style.display='block';
    showToast('✓ Tagged (no sheet set up yet)','warn');
  }
}

function undoTag(upc) {
  const btnUndo=document.getElementById('btn-undo');
  if (btnUndo) btnUndo.disabled=true;
  setSaving(true);
  taggedUPCs.delete(upc);
  tagCount=Math.max(0,tagCount-1);
  document.getElementById('tab-label-scanner').textContent=tagCount?`Scanner (${tagCount})`:'Scanner';
  const item=document.getElementById('item-'+upc);
  if (item) {
    item.classList.remove('tagged');
    const badge=item.querySelector('.tagged-badge');
    if (badge) {
      const upc14=upc.padStart(14,'0');
      const lbUrl=storeRsid?`https://www.lundsandbyerlys.com/sm/pickup/rsid/${storeRsid}/product/${upc14}`:'#';
      badge.outerHTML=`<a class="lb-link" href="${lbUrl}" target="_blank">🛒 View</a>`;
    }
  }
  if (storeUrl) {
    fetch(storeUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'undo',tab:deptTab,upc,workerName:''})
    }).then(()=>{ setSaving(false); showResult(currentUPC); showToast('↩ Undone','warn'); })
    .catch(()=>{ setSaving(false); showResult(currentUPC); showToast('↩ Undone (offline)','warn'); });
  } else { setSaving(false); showResult(currentUPC); showToast('↩ Undone','warn'); }
}

function startScanner() {
  if (typeof Html5Qrcode==='undefined') { showToast('Scanner not loaded','err'); return; }
  document.getElementById('scanner-wrap').style.display='block';
  document.getElementById('btn-start').style.display='none';
  document.getElementById('btn-stop').style.display='block';
  html5QrCode=new Html5Qrcode('qr-reader');
  html5QrCode.start({facingMode:'environment'},{fps:15,qrbox:{width:280,height:120},
    formatsToSupport:[Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.CODE_39,Html5QrcodeSupportedFormats.ITF]},
    (decodedText)=>{
      const now=Date.now();
      if (decodedText===lastScanned&&now-lastScanTime<4000) return;
      lastScanned=decodedText; lastScanTime=now;
      showResult(decodedText);
    },()=>{}
  ).catch(err=>{ showToast('Camera error: '+err,'err'); stopScanner(); });
  scannerOn=true;
}

function stopScanner() {
  if (html5QrCode&&scannerOn) {
    html5QrCode.stop().then(()=>{ html5QrCode.clear(); html5QrCode=null; }).catch(()=>{});
    scannerOn=false;
  }
  document.getElementById('scanner-wrap').style.display='none';
  document.getElementById('btn-start').style.display='block';
  document.getElementById('btn-stop').style.display='none';
}

function lookupManual() {
  const raw=document.getElementById('manual-upc').value.trim();
  if (!raw) return;
  showResult(raw.replace(/[-\s]/g,''));
  document.getElementById('manual-upc').value='';
}

function changeWorker() {
  stopScanner();
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-setup').classList.add('active');
  document.getElementById('header').style.display='none';
  document.getElementById('tab-bar').style.display='none';
}

function setSaving(on) { document.getElementById('saving-indicator').style.display=on?'block':'none'; }

function showToast(msg,type) {
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(type?' '+type:'');
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
</body>
</html>

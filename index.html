<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>L&B Label Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700;900&display=swap');

  :root {
    --maroon: #7A0C2E;
    --maroon-dark: #5a0920;
    --gold: #F0B722;
    --orange: #E07020;
    --cream: #F5F0E8;
    --white: #ffffff;
    --text: #1a0a10;
    --muted: #9a7a84;
    --border: #ddd0d4;
    --success: #1a7a42;
    --success-bg: #edfaf3;
    --warn-bg: #fff7e6;
    --warn: #b86000;
    --error: #c0182e;
    --error-bg: #fff0f2;
    --notfound-bg: #fff3e0;
    --notfound: #E07020;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: var(--maroon);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(122,12,46,0.3);
  }
  .header-title {
    color: var(--white);
    font-size: 16px;
    font-weight: 900;
    letter-spacing: -0.02em;
  }
  .header-sub {
    color: rgba(255,255,255,0.65);
    font-size: 11px;
    font-weight: 500;
  }
  .header-badge {
    background: var(--gold);
    color: var(--maroon-dark);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--white);
    border-bottom: 2px solid var(--border);
  }
  .tab {
    flex: 1;
    padding: 13px;
    text-align: center;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.02em;
    cursor: pointer;
    color: var(--muted);
    border: none;
    background: none;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .tab.active {
    color: var(--maroon);
    border-bottom-color: var(--maroon);
  }

  .page { display: none; padding: 20px; max-width: 480px; margin: 0 auto; }
  .page.active { display: block; }

  /* SCANNER */
  .scanner-wrap {
    position: relative;
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
    aspect-ratio: 1;
    margin-bottom: 16px;
    box-shadow: 0 4px 20px rgba(122,12,46,0.2);
    display: none;
  }
  #interactive { width: 100% !important; height: 100% !important; }
  #interactive video { width: 100% !important; height: 100% !important; object-fit: cover; }
  #interactive canvas { display: none; }
  /* html5-qrcode overrides */
  #qr-reader { border: none !important; padding: 0 !important; width: 100% !important; }
  #qr-reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; border-radius: 0 !important; }
  #qr-reader img { display: none !important; }
  #qr-reader__scan_region { padding: 0 !important; }
  #qr-reader__dashboard { display: none !important; }

  .scan-overlay {
    position: absolute; inset: 0;
    pointer-events: none;
    display: flex; align-items: center; justify-content: center;
  }
  .scan-frame { width: 65%; height: 40%; position: relative; }
  .scan-frame::before, .scan-frame::after,
  .scan-frame span::before, .scan-frame span::after {
    content: ''; position: absolute;
    width: 24px; height: 24px;
    border-color: var(--gold); border-style: solid;
  }
  .scan-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 3px 0 0 0; }
  .scan-frame::after  { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 3px 0 0; }
  .scan-frame span::before { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 3px; }
  .scan-frame span::after  { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 3px 0; }
  .scan-line {
    position: absolute; left: 8%; right: 8%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    animation: scanline 2s ease-in-out infinite;
    box-shadow: 0 0 10px var(--gold);
  }
  @keyframes scanline {
    0%   { top: 8%; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { top: 92%; opacity: 0; }
  }

  .btn {
    display: block; width: 100%;
    padding: 15px; border-radius: 12px; border: none;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700; font-size: 15px;
    cursor: pointer; transition: all 0.18s;
    letter-spacing: 0.01em; margin-bottom: 10px;
  }
  .btn-primary { background: var(--maroon); color: var(--white); }
  .btn-primary:hover { background: var(--maroon-dark); transform: translateY(-1px); }
  .btn-danger  { background: var(--error); color: var(--white); }
  .btn-danger:hover  { opacity: 0.9; }

  /* RESULT CARD */
  .result-card {
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    display: none;
    animation: popIn 0.28s cubic-bezier(0.175,0.885,0.32,1.275);
    border: 2px solid transparent;
  }
  .result-card.show { display: block; }
  .result-card.found    { background: var(--success-bg); border-color: #a8e6c3; }
  .result-card.notfound { background: var(--notfound-bg); border-color: #f5cfa0; }
  .result-card.missing  { background: var(--error-bg); border-color: #f5b8c0; }

  @keyframes popIn {
    from { transform: scale(0.93) translateY(6px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }

  .result-label {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 3px; font-weight: 700;
    font-family: 'Space Mono', monospace;
  }
  .result-code {
    font-family: 'Space Mono', monospace;
    font-size: 16px; font-weight: 700;
    color: var(--maroon); margin-bottom: 14px;
  }
  .result-brand { font-size: 13px; color: var(--muted); margin-bottom: 2px; font-weight: 500; }
  .result-desc  { font-size: 19px; font-weight: 900; line-height: 1.2; margin-bottom: 14px; color: var(--text); }

  .mda-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 30px;
    font-size: 13px; font-weight: 700;
    margin-bottom: 10px;
  }
  .mda-badge.mim { background: #1a3a6e; color: #fff; }
  .mda-badge.mgrown { background: #1a5c2a; color: #fff; }

  .note-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 30px;
    font-size: 13px; font-weight: 700;
  }
  .note-badge.flagged    { background: var(--success); color: #fff; }
  .note-badge.not-flagged { background: var(--notfound); color: #fff; }
  .note-badge.na         { background: #ccc; color: #555; }

  .result-card.missing .result-desc { font-size: 15px; font-weight: 600; color: var(--error); }

  /* MANUAL INPUT */
  .divider {
    display: flex; align-items: center; gap: 10px;
    color: var(--muted); font-size: 12px; font-weight: 500;
    margin: 14px 0;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .manual-row { display: flex; gap: 10px; margin-bottom: 0; }
  .manual-input {
    flex: 1; padding: 13px 15px; border-radius: 12px;
    border: 2px solid var(--border); background: var(--white);
    color: var(--text); font-family: 'Space Mono', monospace; font-size: 14px;
    outline: none; transition: border 0.2s;
  }
  .manual-input:focus { border-color: var(--maroon); }
  .manual-input::placeholder { color: var(--muted); font-family: 'DM Sans', sans-serif; }
  .manual-go {
    padding: 13px 20px; border-radius: 12px; border: none;
    background: var(--maroon); color: var(--white);
    font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 15px;
    cursor: pointer; transition: all 0.18s; white-space: nowrap;
  }
  .manual-go:hover { background: var(--maroon-dark); }

  /* SEARCH PAGE */
  .search-box-wrap { margin-bottom: 16px; }
  .search-input {
    width: 100%; padding: 13px 15px 13px 42px;
    border-radius: 12px; border: 2px solid var(--border);
    background: var(--white); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    outline: none; transition: border 0.2s;
    position: relative;
  }
  .search-input:focus { border-color: var(--maroon); }
  .search-wrap { position: relative; }
  .search-icon {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    font-size: 18px; pointer-events: none;
  }

  .product-list { display: flex; flex-direction: column; gap: 10px; }
  .product-item {
    background: var(--white); border-radius: 14px;
    padding: 14px 16px; border: 1px solid var(--border);
    animation: slideIn 0.18s ease;
    cursor: pointer; transition: border-color 0.18s;
  }
  .product-item:hover { border-color: var(--maroon); }
  @keyframes slideIn {
    from { transform: translateY(-4px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .pi-brand { font-size: 11px; color: var(--muted); font-weight: 500; margin-bottom: 2px; }
  .pi-desc  { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
  .pi-meta  { display: flex; gap: 6px; flex-wrap: wrap; }
  .pi-code  { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }

  .mini-badge {
    font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
  }
  .mini-badge.mim { background: #1a3a6e20; color: #1a3a6e; border: 1px solid #1a3a6e40; }
  .mini-badge.mgrown { background: #1a5c2a20; color: #1a5c2a; border: 1px solid #1a5c2a40; }
  .mini-badge.flagged { background: #1a7a4220; color: var(--success); border: 1px solid #1a7a4240; }
  .mini-badge.not-flagged { background: #E0702020; color: var(--orange); border: 1px solid #E0702040; }

  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px;
  }
  .empty-state .icon { font-size: 44px; margin-bottom: 12px; }

  .count-badge {
    display: inline-block; background: var(--gold); color: var(--maroon-dark);
    font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 20px; margin-left: 8px; vertical-align: middle;
  }

  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--maroon); color: var(--white);
    padding: 11px 22px; border-radius: 30px;
    font-weight: 700; font-size: 13px; z-index: 999;
    transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
    white-space: nowrap; box-shadow: 0 4px 16px rgba(122,12,46,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.warn { background: var(--orange); }
  .toast.ok   { background: var(--success); }

  h2 {
    font-size: 20px; font-weight: 900; margin-bottom: 16px;
    color: var(--maroon);
  }

  .status-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: #ccc; margin-right: 6px; vertical-align: middle;
    animation: pulse 1.5s ease-in-out infinite;
  }
  .status-dot.scanning { background: var(--gold); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">L&B Label Scanner</div>
    <div class="header-sub">MDA Certification Lookup</div>
  </div>
  <div class="header-badge">600 SKUs</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('scanner', this)">📷 Scan</button>
  <button class="tab" onclick="switchTab('search', this)">🔍 Browse</button>
</div>

<!-- SCANNER PAGE -->
<div id="page-scanner" class="page active">

  <div id="scanner-wrap" class="scanner-wrap">
    <div id="qr-reader"></div>
    <div class="scan-overlay">
      <div class="scan-frame"><span></span><div class="scan-line"></div></div>
    </div>
  </div>

  <button class="btn btn-primary" id="start-btn" onclick="startScanner()">
    ▶ &nbsp;Start Camera
  </button>
  <button class="btn btn-danger" id="stop-btn" onclick="stopScanner()" style="display:none;">
    ■ &nbsp;Stop Camera
  </button>

  <div id="result-card" class="result-card"></div>

  <div class="divider">or enter manually</div>
  <div class="manual-row">
    <input class="manual-input" id="manual-upc" type="text" inputmode="numeric"
      placeholder="SKU or UPC code…"
      onkeydown="if(event.key==='Enter') lookupManual()">
    <button class="manual-go" onclick="lookupManual()">→</button>
  </div>

</div>

<!-- SEARCH PAGE -->
<div id="page-search" class="page">
  <h2>Browse Products <span class="count-badge" id="count-badge">600</span></h2>
  <div class="search-wrap search-box-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" type="text"
      placeholder="Search by name, brand, or code…"
      oninput="renderSearch(this.value)">
  </div>
  <div class="product-list" id="product-list"></div>
</div>

<div class="toast" id="toast"></div>

// Build deduplicated list for browse (unique by desc+brand combo)
const UNIQUE_PRODUCTS = {};
for (const [code, p] of Object.entries(PRODUCTS)) {
  const key = p.brand + '||' + p.desc;
  if (!UNIQUE_PRODUCTS[key]) UNIQUE_PRODUCTS[key] = { ...p, code };
}
const PRODUCT_LIST = Object.values(UNIQUE_PRODUCTS);

// ─── State ─────────────────────────────────────────────
let scannerRunning = false;
let lastScanned = '';
let lastScanTime = 0;

// ─── Tabs ──────────────────────────────────────────────
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('page-' + tab).classList.add('active');
  if (tab === 'search') renderSearch('');
}

// ─── Result card ───────────────────────────────────────
function buildResultCard(code, p) {
  const isMIM = p.mda === 'Made in Minnesota';
  const mdaClass = isMIM ? 'mim' : 'mgrown';
  const mdaIcon = isMIM ? '🏭' : '🌱';

  let noteHtml = '';
  if (p.note === 'Not flagged as local') {
    noteHtml = `<span class="note-badge not-flagged">🟠 Orange Tag — Not Flagged as Local</span>`;
  } else if (p.note === 'Flagged as Local') {
    noteHtml = `<span class="note-badge flagged">✓ Flagged as Local</span>`;
  } else {
    noteHtml = `<span class="note-badge na">— No Note</span>`;
  }

  return `
    <div class="result-label">Scanned Code</div>
    <div class="result-code">${code}</div>
    <div class="result-brand">${p.brand}</div>
    <div class="result-desc">${p.desc}</div>
    <span class="mda-badge ${mdaClass}">${mdaIcon} ${p.mda}</span><br><br>
    ${noteHtml}
  `;
}

function lookupCode(code) {
  if (!code) return null;
  // 1. Exact match
  if (PRODUCTS[code]) return PRODUCTS[code];
  // 2. Strip ALL leading zeros
  const stripped = code.replace(/^0+/, '');
  if (PRODUCTS[stripped]) return PRODUCTS[stripped];
  // 3. If 14-digit EAN, try last 13 and last 12
  if (code.length === 14) {
    if (PRODUCTS[code.slice(1)]) return PRODUCTS[code.slice(1)];
    if (PRODUCTS[code.slice(2)]) return PRODUCTS[code.slice(2)];
  }
  // 4. If 13-digit EAN, try last 12
  if (code.length === 13) {
    if (PRODUCTS[code.slice(1)]) return PRODUCTS[code.slice(1)];
  }
  return null;
}

function showResult(code) {
  const card = document.getElementById('result-card');
  let p = lookupCode(code);

  if (p) {
    card.innerHTML = buildResultCard(code, p);
    card.className = 'result-card show found';
    const label = p.note === 'Not flagged as local' ? '🟠 Orange Tag' : '✓ ' + p.desc.slice(0,25);
    showToast(label, p.note === 'Not flagged as local' ? 'warn' : 'ok');
  } else {
    card.innerHTML = `
      <div class="result-label">Scanned Code</div>
      <div class="result-code">${code}</div>
      <div class="result-desc">Not found in the 600-SKU list</div>
    `;
    card.className = 'result-card show missing';
    showToast('Code not in list', 'warn');
  }
}

// ─── Scanner ───────────────────────────────────────────
let html5QrCode = null;

function startScanner() {
  if (typeof Html5Qrcode === 'undefined') {
    showToast('Scanner library not loaded — check internet connection', 'warn');
    return;
  }
  const wrap = document.getElementById('scanner-wrap');
  wrap.style.display = 'block';
  document.getElementById('start-btn').style.display = 'none';
  document.getElementById('stop-btn').style.display = 'block';

  html5QrCode = new Html5Qrcode('qr-reader');

  const config = {
    fps: 10,
    qrbox: { width: 250, height: 150 },
    formatsToSupport: [
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39
    ]
  };

  html5QrCode.start(
    { facingMode: 'environment' },
    config,
    (decodedText) => {
      const now = Date.now();
      if (decodedText === lastScanned && now - lastScanTime < 3000) return;
      lastScanned = decodedText;
      lastScanTime = now;
      showResult(decodedText);
    },
    (errorMessage) => { /* scan errors are normal, ignore */ }
  ).catch(err => {
    showToast('Camera error: ' + err, 'warn');
    stopScanner();
  });

  scannerRunning = true;
}

function stopScanner() {
  if (html5QrCode && scannerRunning) {
    html5QrCode.stop().then(() => {
      html5QrCode.clear();
      html5QrCode = null;
    }).catch(() => {});
    scannerRunning = false;
  }
  document.getElementById('scanner-wrap').style.display = 'none';
  document.getElementById('start-btn').style.display = 'block';
  document.getElementById('stop-btn').style.display = 'none';
}

function lookupManual() {
  const code = document.getElementById('manual-upc').value.trim();
  if (!code) return;
  showResult(code);
  document.getElementById('manual-upc').value = '';
}

// ─── Search/Browse ─────────────────────────────────────
function renderSearch(query) {
  const list = document.getElementById('product-list');
  const q = query.toLowerCase().trim();

  let items = q
    ? PRODUCT_LIST.filter(p =>
        p.desc.toLowerCase().includes(q) ||
        p.brand.toLowerCase().includes(q) ||
        p.code.includes(q)
      )
    : PRODUCT_LIST;

  // Limit display
  const shown = items.slice(0, 80);

  if (shown.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🔍</div>No matches found.</div>`;
    return;
  }

  const mdaBadge = (mda) => mda === 'Made in Minnesota'
    ? `<span class="mini-badge mim">MiMN</span>`
    : `<span class="mini-badge mgrown">MN Grown</span>`;

  const noteBadge = (note) => {
    if (note === 'Flagged as Local') return `<span class="mini-badge flagged">✓ Local</span>`;
    if (note === 'Not flagged as local') return `<span class="mini-badge not-flagged">🟠 Orange Tag</span>`;
    return '';
  };

  list.innerHTML = shown.map(p => `
    <div class="product-item" onclick="selectFromBrowse('${p.code}')">
      <div class="pi-brand">${p.brand}</div>
      <div class="pi-desc">${p.desc}</div>
      <div class="pi-meta">
        ${mdaBadge(p.mda)}
        ${noteBadge(p.note)}
        <span class="pi-code">${p.code}</span>
      </div>
    </div>
  `).join('');

  if (items.length > 80) {
    list.innerHTML += `<div class="empty-state" style="padding:12px;font-size:12px;">Showing 80 of ${items.length} — refine search to see more</div>`;
  }
}

function selectFromBrowse(code) {
  // Switch to scanner tab and show result
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab')[0].classList.add('active');
  document.getElementById('page-scanner').classList.add('active');
  showResult(code);
}

// ─── Toast ─────────────────────────────────────────────
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2800);
}

// Init browse
renderSearch('');
</script>

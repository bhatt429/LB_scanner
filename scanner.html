<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>L&B Label Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700;900&display=swap');
  :root {
    --maroon: #7A0C2E; --maroon-dark: #5a0920;
    --gold: #F0B722; --orange: #E07020;
    --cream: #F5F0E8; --white: #ffffff;
    --text: #1a0a10; --muted: #9a7a84;
    --border: #ddd0d4;
    --success: #1a7a42; --success-bg: #edfaf3;
    --error: #c0182e; --error-bg: #fff0f2;
    --warn: #b86000; --warn-bg: #fff7e6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--cream); color: var(--text); font-family: "DM Sans", sans-serif; min-height: 100vh; }

  /* HEADER */
  .header {
    background: var(--maroon); padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(122,12,46,0.3);
  }
  .header-title { color: #fff; font-size: 16px; font-weight: 900; }
  .header-sub { color: rgba(255,255,255,0.65); font-size: 11px; }
  .header-right { text-align: right; }
  .worker-badge {
    background: var(--gold); color: var(--maroon-dark);
    font-family: "Space Mono", monospace; font-size: 11px; font-weight: 700;
    padding: 4px 10px; border-radius: 20px; cursor: pointer;
  }

  /* PAGES */
  .page { display: none; padding: 20px; max-width: 480px; margin: 0 auto; }
  .page.active { display: block; }

  /* SETUP PAGE */
  .setup-card {
    background: var(--white); border-radius: 16px;
    padding: 28px 24px; box-shadow: 0 2px 12px rgba(122,12,46,0.1);
    margin-top: 24px;
  }
  .setup-logo { text-align: center; margin-bottom: 24px; }
  .setup-logo-text { font-size: 28px; font-weight: 900; color: var(--maroon); }
  .setup-logo-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .field-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
    font-family: "Space Mono", monospace;
  }
  .field-wrap { margin-bottom: 16px; }
  .field-input {
    width: 100%; padding: 13px 15px; border-radius: 12px;
    border: 2px solid var(--border); background: var(--cream);
    color: var(--text); font-family: "DM Sans", sans-serif; font-size: 15px;
    outline: none; transition: border 0.2s; appearance: none;
  }
  .field-input:focus { border-color: var(--maroon); }

  /* BUTTONS */
  .btn {
    display: block; width: 100%; padding: 15px; border-radius: 12px;
    border: none; font-family: "DM Sans", sans-serif;
    font-weight: 700; font-size: 15px; cursor: pointer;
    transition: all 0.18s; letter-spacing: 0.01em; margin-bottom: 10px;
  }
  .btn-primary { background: var(--maroon); color: #fff; }
  .btn-primary:active { background: var(--maroon-dark); }
  .btn-danger { background: var(--error); color: #fff; }
  .btn-success { background: var(--success); color: #fff; font-size: 17px; padding: 18px; }
  .btn-outline {
    background: transparent; color: var(--maroon);
    border: 2px solid var(--maroon);
  }

  /* SCANNER */
  .scanner-wrap {
    position: relative; width: 100%; border-radius: 16px;
    overflow: hidden; background: #000; aspect-ratio: 1;
    margin-bottom: 16px; box-shadow: 0 4px 20px rgba(122,12,46,0.2);
    display: none;
  }
  #qr-reader { border: none !important; padding: 0 !important; width: 100% !important; }
  #qr-reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; border-radius: 0 !important; }
  #qr-reader img { display: none !important; }
  #qr-reader__scan_region { padding: 0 !important; }
  #qr-reader__dashboard { display: none !important; }
  .scan-overlay { position: absolute; inset: 0; pointer-events: none; display: flex; align-items: center; justify-content: center; }
  .scan-frame { width: 72%; height: 35%; position: relative; }
  .scan-frame::before, .scan-frame::after, .scan-frame span::before, .scan-frame span::after {
    content: ""; position: absolute; width: 24px; height: 24px;
    border-color: var(--gold); border-style: solid;
  }
  .scan-frame::before { top:0; left:0; border-width: 3px 0 0 3px; border-radius: 3px 0 0 0; }
  .scan-frame::after  { top:0; right:0; border-width: 3px 3px 0 0; border-radius: 0 3px 0 0; }
  .scan-frame span::before { bottom:0; left:0; border-width: 0 0 3px 3px; border-radius: 0 0 0 3px; }
  .scan-frame span::after  { bottom:0; right:0; border-width: 0 3px 3px 0; border-radius: 0 0 3px 0; }
  .scan-line {
    position: absolute; left: 4%; right: 4%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    animation: scanline 2s ease-in-out infinite; box-shadow: 0 0 10px var(--gold);
  }
  @keyframes scanline { 0%{top:4%;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{top:96%;opacity:0} }

  /* RESULT CARD */
  .result-card {
    border-radius: 16px; padding: 20px; margin-bottom: 12px;
    display: none; border: 2px solid transparent;
    animation: popIn 0.25s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  .result-card.show { display: block; }
  .result-card.found { background: var(--success-bg); border-color: #a8e6c3; }
  .result-card.notfound { background: var(--error-bg); border-color: #f5b8c0; }
  .result-card.already { background: var(--warn-bg); border-color: #f5d08c; }
  @keyframes popIn { from{transform:scale(0.93) translateY(6px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }

  .result-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; font-weight: 700; font-family: "Space Mono", monospace; }
  .result-code { font-family: "Space Mono", monospace; font-size: 13px; font-weight: 700; color: var(--maroon); margin-bottom: 12px; word-break: break-all; }
  .result-brand { font-size: 13px; color: var(--muted); margin-bottom: 2px; font-weight: 500; }
  .result-desc { font-size: 19px; font-weight: 900; line-height: 1.2; margin-bottom: 12px; }

  .tag-box {
    border-radius: 10px; padding: 12px 14px; margin-bottom: 14px;
    border: 2px solid;
  }
  .tag-box.mim { background: #1a3a6e12; border-color: #1a3a6e40; }
  .tag-box.mgrown { background: #1a5c2a12; border-color: #1a5c2a40; }
  .tag-box-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; font-family: "Space Mono", monospace; }
  .tag-box.mim .tag-box-label { color: #1a3a6e; }
  .tag-box.mgrown .tag-box-label { color: #1a5c2a; }
  .tag-box-name { font-size: 16px; font-weight: 900; }
  .tag-box.mim .tag-box-name { color: #1a3a6e; }
  .tag-box.mgrown .tag-box-name { color: #1a5c2a; }

  .note-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 30px;
    font-size: 12px; font-weight: 700; margin-bottom: 14px;
  }
  .note-badge.flagged { background: var(--success); color: #fff; }
  .note-badge.not-flagged { background: var(--orange); color: #fff; }
  .note-badge.na { background: #ccc; color: #555; }

  .already-info { font-size: 13px; color: var(--warn); margin-bottom: 14px; font-weight: 600; }

  /* MANUAL */
  .divider { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 12px; margin: 14px 0; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .manual-row { display: flex; gap: 10px; }
  .manual-input {
    flex: 1; padding: 13px 15px; border-radius: 12px;
    border: 2px solid var(--border); background: #fff;
    color: var(--text); font-family: "Space Mono", monospace; font-size: 14px;
    outline: none; transition: border 0.2s;
  }
  .manual-input:focus { border-color: var(--maroon); }
  .manual-go {
    padding: 13px 20px; border-radius: 12px; border: none;
    background: var(--maroon); color: #fff;
    font-family: "DM Sans", sans-serif; font-weight: 700; font-size: 15px; cursor: pointer;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--maroon); color: #fff;
    padding: 11px 22px; border-radius: 30px;
    font-weight: 700; font-size: 13px; z-index: 999;
    transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
    white-space: nowrap; box-shadow: 0 4px 16px rgba(122,12,46,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.ok   { background: var(--success); }
  .toast.warn { background: var(--orange); }
  .toast.err  { background: var(--error); }

  /* STATUS BAR */
  .status-bar {
    background: var(--white); border-top: 1px solid var(--border);
    padding: 8px 20px; display: flex; justify-content: space-between;
    font-size: 11px; color: var(--muted); font-family: "Space Mono", monospace;
    position: sticky; bottom: 0;
  }
  .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #ccc; margin-right: 5px; vertical-align: middle; }
  .status-dot.scanning { background: var(--gold); animation: pulse 1.5s infinite; }
  .status-dot.loaded   { background: var(--success); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  h2 { font-size: 18px; font-weight: 900; color: var(--maroon); margin-bottom: 16px; }
  .loading-msg { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header" id="header" style="display:none;">
  <div>
    <div class="header-title">L&B Label Scanner</div>
    <div class="header-sub" id="header-dept">—</div>
  </div>
  <div class="header-right">
    <div class="worker-badge" id="worker-badge" onclick="changeWorker()">👤 —</div>
  </div>
</div>

<!-- PAGE: SETUP -->
<div class="page active" id="page-setup">
  <div class="setup-card">
    <div class="setup-logo">
      <div class="setup-logo-text">L&B Scanner</div>
      <div class="setup-logo-sub">MDA Label Compliance Tool</div>
    </div>

    <div class="field-wrap">
      <div class="field-label">Your Name</div>
      <input class="field-input" id="worker-name" type="text" placeholder="e.g. Sarah" autocomplete="off">
    </div>

    <div class="field-wrap">
      <div class="field-label">Store</div>
      <select class="field-input" id="store-select">
        <option value="">— Select store —</option>
        <option>Golden Valley</option>
        <option>St. Louis Park</option>
        <option>Burnsville</option>
        <option>Chanhassen</option>
        <option>Eagan</option>
        <option>Maple Grove</option>
        <option>Woodbury</option>
        <option>Plymouth</option>
        <option>White Bear Lake</option>
      </select>
    </div>

    <div class="field-wrap">
      <div class="field-label">Department</div>
      <select class="field-input" id="dept-select">
        <option value="">— Loading tabs… —</option>
      </select>
    </div>

    <button class="btn btn-primary" onclick="startSession()">Start Scanning →</button>
    <div id="setup-msg" style="text-align:center;font-size:12px;color:var(--muted);margin-top:8px;"></div>
  </div>
</div>

<!-- PAGE: SCANNER -->
<div class="page" id="page-scanner">
  <div id="loading-rows" class="loading-msg">⏳ Loading product list…</div>

  <div id="scanner-main" style="display:none;">
    <div id="scanner-wrap" class="scanner-wrap">
      <div id="qr-reader"></div>
      <div class="scan-overlay">
        <div class="scan-frame"><span></span><div class="scan-line"></div></div>
      </div>
    </div>

    <button class="btn btn-primary" id="start-btn" onclick="startScanner()">▶ &nbsp;Start Camera</button>
    <button class="btn btn-danger"  id="stop-btn"  onclick="stopScanner()" style="display:none;">■ &nbsp;Stop Camera</button>

    <div id="result-card" class="result-card"></div>

    <div class="divider">or enter manually</div>
    <div class="manual-row">
      <input class="manual-input" id="manual-upc" type="text" inputmode="numeric"
        placeholder="Type UPC…" onkeydown="if(event.key==='Enter') lookupManual()">
      <button class="manual-go" onclick="lookupManual()">→</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="status-bar" id="status-bar" style="display:none;">
  <span><span class="status-dot" id="status-dot"></span><span id="status-text">—</span></span>
  <span id="status-count">0 tagged</span>
</div>

<script>
// ── Config ──────────────────────────────────────────────────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzNRL_U262OZatUqWIYC6UMHMjqyYWN_Ih2KEOhfP6M1aID6UwRlva_MWgPEAfvtf5K/exec';

// ── State ───────────────────────────────────────────────────
let workerName = '';
let storeName  = '';
let deptTab    = '';
let sheetRows  = [];   // rows loaded from sheet for current dept
let lastScanned = '';
let lastScanTime = 0;
let html5QrCode = null;
let scannerRunning = false;
let taggedCount = 0;
let currentMatchedRow = null; // the sheet row currently displayed

// ── On load: fetch tab names for dept dropdown ───────────────
window.addEventListener('load', () => {
  fetch(APPS_SCRIPT_URL)
    .then(r => r.json())
    .then(data => {
      const sel = document.getElementById('dept-select');
      sel.innerHTML = '<option value="">— Select department —</option>';
      if (data.tabs) {
        data.tabs.forEach(tab => {
          const opt = document.createElement('option');
          opt.value = opt.textContent = tab;
          sel.appendChild(opt);
        });
      }
    })
    .catch(() => {
      document.getElementById('dept-select').innerHTML =
        '<option value="">— Could not load tabs —</option>';
    });
});

// ── Start session ────────────────────────────────────────────
function startSession() {
  workerName = document.getElementById('worker-name').value.trim();
  storeName  = document.getElementById('store-select').value;
  deptTab    = document.getElementById('dept-select').value;
  const msg  = document.getElementById('setup-msg');

  if (!workerName) { msg.textContent = 'Please enter your name.'; return; }
  if (!storeName)  { msg.textContent = 'Please select a store.'; return; }
  if (!deptTab)    { msg.textContent = 'Please select a department.'; return; }

  // Show scanner page
  showPage('scanner');
  document.getElementById('header').style.display = 'flex';
  document.getElementById('status-bar').style.display = 'flex';
  document.getElementById('header-dept').textContent = storeName + ' · ' + deptTab;
  document.getElementById('worker-badge').textContent = '👤 ' + workerName;
  setStatus('loading', 'Loading ' + deptTab + '…');

  // Load rows from sheet
  loadRows();
}

// ── Load rows from sheet for selected dept ───────────────────
function loadRows() {
  document.getElementById('loading-rows').style.display = 'block';
  document.getElementById('scanner-main').style.display = 'none';

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'getRows', tab: deptTab })
  })
  .then(r => r.json())
  .then(data => {
    if (!data.success) throw new Error(data.error);
    sheetRows = data.rows;
    taggedCount = sheetRows.filter(r => r.status === 'Tagged ✓').length;
    document.getElementById('loading-rows').style.display = 'none';
    document.getElementById('scanner-main').style.display = 'block';
    setStatus('loaded', 'Ready — ' + sheetRows.length + ' products');
    updateCount();
    showToast('Loaded ' + sheetRows.length + ' products', 'ok');
  })
  .catch(err => {
    document.getElementById('loading-rows').textContent = '❌ Failed to load: ' + err.message;
    setStatus('', 'Load failed');
  });
}

// ── Lookup logic: try multiple UPC variants ──────────────────
function lookupUPC(raw) {
  const cleaned = raw.replace(/[-\s]/g, '');

  const variants = new Set();
  variants.add(cleaned);
  // strip leading zeros
  variants.add(cleaned.replace(/^0+/, ''));
  // pad to 13
  variants.add(cleaned.padStart(13, '0'));
  // pad to 12
  variants.add(cleaned.padStart(12, '0'));
  // drop last digit (check digit)
  if (cleaned.length > 1) variants.add(cleaned.slice(0, -1));
  if (cleaned.replace(/^0+/, '').length > 1)
    variants.add(cleaned.replace(/^0+/, '').slice(0, -1));

  for (const v of variants) {
    if (!v) continue;
    const row = sheetRows.find(r => {
      const rowUpc = String(r.upc || '').replace(/^0+/, '');
      return rowUpc === v.replace(/^0+/, '');
    });
    if (row) return row;
  }
  return null;
}

// ── Show result card ─────────────────────────────────────────
function showResult(scannedCode) {
  const row = lookupUPC(scannedCode);
  currentMatchedRow = row;
  const card = document.getElementById('result-card');

  if (!row) {
    card.innerHTML = `
      <div class="result-label">Scanned</div>
      <div class="result-code">${scannedCode}</div>
      <div style="font-size:16px;font-weight:700;color:var(--error);margin-bottom:8px;">❌ No match found</div>
      <div style="font-size:13px;color:var(--muted);">This UPC is not in the ${deptTab} product list.</div>
    `;
    card.className = 'result-card show notfound';
    showToast('No match', 'err');
    return;
  }

  const isMIM    = row.mda === 'Made in Minnesota';
  const tagClass = isMIM ? 'mim' : 'mgrown';
  const tagIcon  = isMIM ? '🏭' : '🌱';
  const tagName  = isMIM ? 'Made in Minnesota (MIM)' : 'MN Grown (MG)';

  let noteBadge = '';
  if (row.note === 'Flagged as Local')
    noteBadge = `<span class="note-badge flagged">✓ Flagged as Local</span>`;
  else if (row.note === 'Not flagged as local')
    noteBadge = `<span class="note-badge not-flagged">🟠 Not Flagged as Local</span>`;
  else
    noteBadge = `<span class="note-badge na">— No Note</span>`;

  const alreadyTagged = row.status === 'Tagged ✓';
  const alreadyHtml = alreadyTagged
    ? `<div class="already-info">⚠️ Already tagged by <strong>${row.scannedBy}</strong> at ${row.timestamp}</div>`
    : '';

  const doneBtn = alreadyTagged
    ? `<button class="btn btn-outline" onclick="undoTag()">↩ Undo Tag</button>`
    : `<button class="btn btn-success" onclick="confirmDone()">✓ &nbsp;Done — Tag Applied</button>`;

  card.innerHTML = `
    <div class="result-label">Scanned</div>
    <div class="result-code">${scannedCode}</div>
    <div class="result-brand">${row.brand}</div>
    <div class="result-desc">${row.desc}</div>
    <div class="tag-box ${tagClass}">
      <div class="tag-box-label">Apply this tag</div>
      <div class="tag-box-name">${tagIcon} ${tagName}</div>
    </div>
    ${noteBadge}
    <br>
    ${alreadyHtml}
    ${doneBtn}
  `;
  card.className = alreadyTagged
    ? 'result-card show already'
    : 'result-card show found';

  showToast(alreadyTagged ? '⚠️ Already tagged' : row.desc.slice(0, 28), alreadyTagged ? 'warn' : 'ok');
}

// ── Confirm done ─────────────────────────────────────────────
function confirmDone() {
  if (!currentMatchedRow) return;
  const btn = document.querySelector('#result-card .btn-success');
  if (btn) { btn.textContent = '⏳ Saving…'; btn.disabled = true; }

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'tag',
      tab: deptTab,
      upc: currentMatchedRow.upc,
      workerName: workerName
    })
  }).then(() => {
    // Update local cache
    currentMatchedRow.status    = 'Tagged ✓';
    currentMatchedRow.scannedBy = workerName;
    currentMatchedRow.timestamp = new Date().toLocaleString();
    taggedCount++;
    updateCount();
    showResult(currentMatchedRow.upc);
    showToast('✓ Tagged & saved!', 'ok');
  }).catch(() => {
    showToast('Network error — try again', 'err');
    if (btn) { btn.textContent = '✓ Done — Tag Applied'; btn.disabled = false; }
  });
}

// ── Undo tag ─────────────────────────────────────────────────
function undoTag() {
  if (!currentMatchedRow) return;
  const btn = document.querySelector('#result-card .btn-outline');
  if (btn) { btn.textContent = '⏳ Undoing…'; btn.disabled = true; }

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'undo',
      tab: deptTab,
      upc: currentMatchedRow.upc,
      workerName: ''
    })
  }).then(() => {
    currentMatchedRow.status    = '';
    currentMatchedRow.scannedBy = '';
    currentMatchedRow.timestamp = '';
    taggedCount = Math.max(0, taggedCount - 1);
    updateCount();
    showResult(currentMatchedRow.upc);
    showToast('↩ Tag undone', 'warn');
  }).catch(() => {
    showToast('Network error — try again', 'err');
    if (btn) { btn.textContent = '↩ Undo Tag'; btn.disabled = false; }
  });
}

// ── Scanner ──────────────────────────────────────────────────
function startScanner() {
  if (typeof Html5Qrcode === 'undefined') {
    showToast('Scanner library not loaded', 'err'); return;
  }
  document.getElementById('scanner-wrap').style.display = 'block';
  document.getElementById('start-btn').style.display = 'none';
  document.getElementById('stop-btn').style.display  = 'block';
  setStatus('scanning', 'Scanning…');

  html5QrCode = new Html5Qrcode('qr-reader');
  html5QrCode.start(
    { facingMode: 'environment' },
    {
      fps: 15,
      qrbox: { width: 280, height: 110 },
      formatsToSupport: [
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.UPC_E,
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.ITF
      ]
    },
    (decodedText) => {
      const now = Date.now();
      if (decodedText === lastScanned && now - lastScanTime < 3000) return;
      lastScanned  = decodedText;
      lastScanTime = now;
      showResult(decodedText);
    },
    () => {}
  ).catch(err => {
    showToast('Camera error: ' + err, 'err');
    stopScanner();
  });
  scannerRunning = true;
}

function stopScanner() {
  if (html5QrCode && scannerRunning) {
    html5QrCode.stop().then(() => { html5QrCode.clear(); html5QrCode = null; }).catch(() => {});
    scannerRunning = false;
  }
  document.getElementById('scanner-wrap').style.display = 'none';
  document.getElementById('start-btn').style.display = 'block';
  document.getElementById('stop-btn').style.display  = 'none';
  setStatus('loaded', 'Ready');
}

function lookupManual() {
  const raw = document.getElementById('manual-upc').value.trim();
  if (!raw) return;
  showResult(raw.replace(/[-\s]/g, ''));
  document.getElementById('manual-upc').value = '';
}

// ── Helpers ──────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
}

function changeWorker() {
  stopScanner();
  showPage('setup');
  document.getElementById('header').style.display = 'none';
  document.getElementById('status-bar').style.display = 'none';
}

function setStatus(state, text) {
  document.getElementById('status-text').textContent = text;
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (state ? ' ' + state : '');
}

function updateCount() {
  document.getElementById('status-count').textContent = taggedCount + ' tagged';
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
